<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>Doodle Jump</title>
        <link rel="stylesheet" href="doodlejump.css">
        <script src="doodlejump.js" defer></script>
    </head>
    <body>
        <main class="app-shell">
            <section class="game-card">
                <div class="hud-row">
                    <span class="hud-pill"><strong id="scoreValue">0</strong></span>
                    <button class="secondary-button" type="button" id="restartButton">Reset</button>
                    <span class="hud-pill"><strong id="bestScoreValue">0</strong></span>
                </div>

                <section class="board-panel">
                    <canvas id="board" aria-label="Doodle Jump game board"></canvas>
                    <div class="board-overlay" id="gameOverlay">
                        <div class="overlay-content">
                            <button class="primary-button" type="button" id="startButton">Start</button>
                        </div>
                    </div>
                </section>
            </section>
        </main>
    </body>
</html>
