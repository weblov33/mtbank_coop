<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>Джампер</title>
        <link rel="stylesheet" href="doodlejump.css">
        <script src="doodlejump.js" defer></script>
    </head>
    <body>
        <main class="app-shell">
            <section class="game-screen">
                <header class="top-stats">
                    <article class="stat-card">
                        <div class="stat-pill">
                            <span class="stat-icon" aria-hidden="true">
                                <img src="../../assets_home/огонек.svg" alt="">
                            </span>
                            <strong id="streakValue">12</strong>
                        </div>
                        <p>Уровень серии</p>
                    </article>

                    <article class="score-card">
                        <strong id="scoreValue">0</strong>
                        <p>Очки</p>
                    </article>

                    <article class="stat-card">
                        <div class="stat-pill stat-pill--lightning">
                            <span class="stat-icon" aria-hidden="true">
                                <img src="../../assets_home/молния.svg" alt="">
                            </span>
                            <strong id="lightningValue">+0</strong>
                        </div>
                        <p>Молнии</p>
                    </article>
                </header>

                <section class="board-stage">
                    <div class="board-frame">
                        <div class="board-decor board-decor--left" aria-hidden="true"></div>
                        <div class="board-decor board-decor--right" aria-hidden="true"></div>
                        <canvas id="board" aria-label="Doodle Jump game board"></canvas>
                        <div class="board-overlay" id="gameOverlay">
                            <div class="overlay-content">
                                <p class="overlay-kicker" id="overlayKicker">Мини-игра</p>
                                <h1 class="overlay-title" id="overlayTitle">Джампер</h1>
                                <p class="overlay-copy" id="overlayCopy">Наберите 1000 очков и соберите молнии по пути.</p>
                                <button class="primary-button" type="button" id="startButton">Играть</button>
                            </div>
                        </div>
                    </div>
                </section>

                <footer class="bottom-bar">
                    <button class="circle-button" type="button" id="backButton" aria-label="Назад">
                        <span class="circle-button__icon circle-button__icon--back" aria-hidden="true"></span>
                    </button>

                    <section class="mission-card" aria-label="Прогресс задания">
                        <div class="mission-copy">
                            <span class="mission-icon" aria-hidden="true">
                                <img src="../../assets_home/молния.svg" alt="">
                            </span>
                            <p id="missionLabel">Получите 1000 очков</p>
                        </div>
                        <div class="progress-row">
                            <div class="progress-track" aria-hidden="true">
                                <span class="progress-fill" id="progressFill"></span>
                            </div>
                            <strong class="progress-value" id="progressValue">0 / 1000</strong>
                        </div>
                    </section>

                    <button class="circle-button" type="button" id="pauseButton" aria-label="Пауза">
                        <span class="circle-button__icon circle-button__icon--pause" id="pauseIcon" aria-hidden="true"></span>
                    </button>
                </footer>
            </section>
        </main>
    </body>
</html>
