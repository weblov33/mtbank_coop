<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>2048</title>

  <link href="style/main.css" rel="stylesheet" type="text/css">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="meta/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="HandheldFriendly" content="True">
  <meta name="MobileOptimized" content="320">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
</head>
<body>
  <main class="app-shell">
    <section class="game-screen">
      <section class="stats-strip">
        <article class="stat-card stat-card--series">
          <div class="stat-value stat-value--with-icon">
            <img src="../../assets_home/огонек.svg" alt="" class="stat-icon">
            <span>12</span>
          </div>
          <p class="stat-label">Уровень серии</p>
        </article>

        <article class="stat-card stat-card--score">
          <div class="stat-value hud-score-value">0</div>
          <p class="stat-label">Очки</p>
        </article>

        <article class="stat-card stat-card--lightning">
          <div class="stat-value stat-value--with-icon">
            <img src="../../assets_home/молния.svg" alt="" class="stat-icon">
            <span id="lightningValue">+0</span>
          </div>
          <p class="stat-label">Молнии</p>
        </article>
      </section>

      <section class="scoreboard-panel">
        <div class="scoreboard-copy">
          <h2 class="scoreboard-title">2048</h2>
        </div>

        <div class="scoreboard-cards">
          <article class="result-card">
            <span class="result-label">Рекорд</span>
            <div class="score-container">0</div>
          </article>
          <article class="result-card">
            <span class="result-label">Лучший</span>
            <div class="best-container">0</div>
          </article>
        </div>
      </section>

      <section class="controls-panel" aria-label="Действия">
        <button class="control-button" type="button" onclick="handle_undo()" aria-label="Отменить">
          <span class="control-circle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 7 5 12l5 5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
              <path d="M6 12h6.2a5.8 5.8 0 1 1 0 11.6H10" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
            </svg>
          </span>
          <span class="control-label">Отменить</span>
        </button>

        <button class="control-button retry-button" type="button" aria-label="Новая игра">
          <span class="control-circle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18.5 8.5A7.5 7.5 0 0 0 5.9 6.4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
              <path d="M6 3.8v4.8h4.8" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
              <path d="M5.5 15.5A7.5 7.5 0 0 0 18.1 17.6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
              <path d="M18 20.2v-4.8h-4.8" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
            </svg>
          </span>
          <span class="control-label">Новая игра</span>
        </button>
      </section>

      <section class="board-shell">
        <div class="game-container">
          <div class="game-message">
            <div class="message-card">
              <p></p>
              <div class="lower">
                <a class="keep-playing-button">Продолжить</a>
                <a class="retry-button">Играть снова</a>
              </div>
            </div>
          </div>

          <div class="grid-container">
            <div class="grid-row">
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
            </div>
            <div class="grid-row">
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
            </div>
            <div class="grid-row">
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
            </div>
            <div class="grid-row">
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
              <div class="grid-cell"></div>
            </div>
          </div>

          <div class="tile-container"></div>
        </div>
      </section>

      <aside class="hint-card">
        <img src="../../assets_home/молния.svg" alt="" class="hint-icon">
        <p>Объединяйте числа и получайте больше очков</p>
      </aside>
    </section>
  </main>

  <script src="js/seedrandom.js"></script>
  <script src="js/animframe_polyfill.js"></script>
  <script src="js/keyboard_input_manager.js"></script>
  <script src="js/html_actuator.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/tile.js"></script>
  <script src="js/local_score_manager.js"></script>
  <script src="js/game_manager.js"></script>
  <script src="js/application.js"></script>
</body>
</html>
